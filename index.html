<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">
        <h1>Guess a number from 1 to 100</h1>
        
        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="100" placeholder="">
            <button id="checkBtn">Check</button>
        </div>

        <p id="message" class="chances-text">You have 10 chances</p>
    </div>

    <script>
        // Lógica do Jogo
        const secretNumber = Math.floor(Math.random() * 100) + 1;
        let chances = 10;

        const input = document.getElementById('guessInput');
        const button = document.getElementById('checkBtn');
        const message = document.getElementById('message');

        button.addEventListener('click', () => {
            const userGuess = parseInt(input.value);

            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                alert('Please enter a valid number between 1 and 100.');
                return;
            }

            chances--;

            if (userGuess === secretNumber) {
                message.innerHTML = `🎉 Correct! The number was ${secretNumber}!`;
                message.style.color = "#2e7d32";
                button.disabled = true;
            } else if (chances === 0) {
                message.innerHTML = `💥 Game Over! The number was ${secretNumber}.`;
                message.style.color = "#c62828";
                button.disabled = true;
            } else {
                const hint = userGuess > secretNumber ? "Too high!" : "Too low!";
                message.innerHTML = `${hint} You have ${chances} chances left.`;
            }

            input.value = '';
            input.focus();
        });
    </script>

</body>
</html>
